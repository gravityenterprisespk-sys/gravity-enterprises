<!DOCTYPE html>

<body>

<div class="background"></div>

        <div class="buttons">

            <a href="https://wa.me/923438883007" class="btn whatsapp">

                    <div>

            <a href="https://www.instagram.com/gravityenterprises.pk/" class="btn instagram">

                    <i class="fab fa-instagram"></i>
                    <div>
                        <h3>Instagram</h3>

                    </div>

                <i class="fas fa-chevron-right"></i>

            <!-- Facebook -->

                <div class="left">
                    <i class="fab fa-facebook-f"></i>
                    <div>
                        <h3>Facebook</h3>
                        <span>Latest Updates</span>
                    </div>
                </div>

                <i class="fas fa-chevron-right"></i>
            </a>

            <!-- Call -->
            <a href="tel:+923438883007" class="btn call">
                <div class="left">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h3>Call Now</h3>
                        <span>+92 343 8883007</span>
                    </div>
                </div>

                <i class="fas fa-chevron-right"></i>
            </a>

        </div>

        <div class="footer">

            <div class="social">

                <a href="https://wa.me/923438883007">
                    <i class="fab fa-whatsapp"></i>
                </a>

                <a href="https://www.instagram.com/gravityenterprises.pk/">
